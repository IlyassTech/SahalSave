<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>SahalSave | نظام الادخار</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #fdf6e3; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; background: white; padding: 30px; border-radius: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); border-top: 10px solid #006233; position: relative; margin-top: 80px; }
        .cat-mascot { width: 90px; height: 90px; position: absolute; top: -50px; left: 50%; transform: translateX(-50%); border: 4px solid #006233; border-radius: 50%; background: white; object-fit: cover; }
        h1 { color: #006233; text-align: center; margin-top: 40px; }
        input, select, button { width: 100%; padding: 15px; margin: 10px 0; border-radius: 15px; border: 2px solid #eee; }
        button { background: #006233; color: white; font-weight: bold; cursor: pointer; border: none; font-size: 1.1em; }
        button:hover { background: #c8102e; }
        .btn-group { display: flex; gap: 10px; }
        .secondary { background: #c8102e; flex: 1; border: none; color: white; padding: 15px; border-radius: 15px; }
        .modal { display: none; background: #fff5f5; padding: 15px; border-radius: 15px; margin-top: 15px; border: 1px solid #c8102e; font-size: 0.9em; text-align: center; }
        #res { text-align: center; font-weight: bold; margin-top: 20px; color: #006233; font-size: 1.2em; }
        #chartContainer { margin-top: 30px; }
    </style>
</head>
<body>

<div class="container">
    <img src="https://img.freepik.com/free-vector/cute-cat-sitting-cartoon-vector-icon-illustration-animal-nature-icon-concept-isolated-premium-flat_138676-5085.jpg" class="cat-mascot" alt="قطة">
    
    <h1>🌍 SahalSave</h1>
    
    <input type="number" id="monthly" placeholder="الادخار الشهري">
    <input type="number" id="goal" placeholder="الهدف الإجمالي">
    
    <select id="currency">
        <option value="MAD">🇲🇦 درهم مغربي (MAD)</option>
        <option value="USD">🇺🇸 دولار أمريكي (USD)</option>
        <option value="EUR">🇪🇺 يورو (EUR)</option>
    </select>
    
    <button onclick="calculate()">حساب النتائج</button>
    <div class="btn-group">
        <button class="secondary" onclick="toggleModal('tipModal')">💡 نصيحة</button>
        <button class="secondary" onclick="toggleModal('challengeModal')">🏆 تحدي</button>
    </div>

    <div id="tipModal" class="modal">💡 "الادخار ليس ما يتبقى، بل ما تقتطعه أولاً."</div>
    <div id="challengeModal" class="modal">🏆 "تحدي الـ 52 أسبوعاً: ابدأ صغيراً لتجمع مبالغ كبيرة."</div>

    <div id="res"></div>
    <div id="chartContainer"><canvas id="myChart"></canvas></div>
</div>

<script>
    function toggleModal(id) {
        let m = document.getElementById(id);
        m.style.display = (m.style.display === 'block') ? 'none' : 'block';
    }

    function calculate() {
        let m = parseFloat(document.getElementById('monthly').value);
        let g = parseFloat(document.getElementById('goal').value);
        
        // التحقق من القيم المدخلة
        if (isNaN(m) || isNaN(g) || m <= 0 || g <= 0) {
            document.getElementById('res').innerHTML = "الرجاء إدخال أرقام صحيحة.";
            return;
        }

        let months = Math.ceil(g / m);
        
        // عرض النتيجة بالشهور فقط كما طلبت
        document.getElementById('res').innerHTML = `ستحقق هدفك خلال <strong>${months}</strong> شهراً.`;
        
        const ctx = document.getElementById('myChart').getContext('2d');
        if (window.myChartInstance) window.myChartInstance.destroy();
        
        window.myChartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array.from({length: months}, (_, i) => i+1),
                datasets: [{ 
                    label: 'المدخرات المتوقعة', 
                    data: Array.from({length: months}, (_, i) => (i+1)*m), 
                    borderColor: '#c8102e', 
                    tension: 0.4 
                }]
            }
        });
    }
</script>
</body>
</html>
